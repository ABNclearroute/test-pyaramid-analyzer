  # ── 2c. Code patterns ───────────────────────────────────────
  # Language-agnostic patterns matched against file body.
  # weight is per match, capped at 3× by the scorer.
  code_patterns:

    unit:
      - name: "mock / patch / stub / fake"
        pattern: "\\b(mock|Mock|patch|stub|Stub|fake|Fake|MagicMock|createMock|MockBean)\\b"
        weight: 1.2

      - name: "spy / verify call assertions"
        pattern: "\\b(spy|verify|assert_called|assert_called_with|assert_called_once|EXPECT_CALL|expect\\(\\w.*\\)\\.toHaveBeenCalled)\\b"
        weight: 1.0

      - name: "assert / assertEquals"
        pattern: "\\b(assertEquals|assertThat|assertRaises|assert_raises|assertEqual|assertSame|assertNull|assertThrows|ASSERT_EQ|EXPECT_EQ|EXPECT_TRUE)\\b"
        weight: 0.5

      - name: "in-memory / fake implementation"
        pattern: "\\b(InMemory|FakeRepository|FakeService|FakeClient|StubRepository|MemoryDb)\\b"
        weight: 1.5

    integration:
      - name: "HTTP client call"
        pattern: "\\b(requests\\.get|requests\\.post|requests\\.put|requests\\.delete|http\\.get|axios\\.get|axios\\.post|fetch\\(|urllib\\.request|HttpClient|RestTemplate|WebClient)\\b"
        weight: 2.0

      - name: "database connection / ORM"
        pattern: "\\b(psycopg2|pymongo|pymysql|sqlalchemy|EntityManager|JdbcTemplate|DataSource|mongoclient|redis\\.Redis|db\\.execute|connection\\.query|prisma\\.|mongoose\\.connect)\\b"
        weight: 2.5

      - name: "message queue / event bus"
        pattern: "\\b(kafka|rabbitmq|celery|pika|boto3|sns|sqs|pubsub|amqp|nats|pulsar|eventbus)\\b"
        weight: 2.0

      - name: "test database / Django/Rails test case"
        pattern: "\\b(LiveServerTestCase|TransactionTestCase|pytest_django|django\\.test|RefreshDatabase|DatabaseMigrations|DatabaseCleaner)\\b"
        weight: 2.0

      - name: "container / docker"
        pattern: "\\b(DockerContainer|GenericContainer|testcontainers|docker\\.from_env|StartupCheckStrategy|withExposedPorts)\\b"
        weight: 3.0

      - name: "gRPC / SOAP client"
        pattern: "\\b(grpc\\.insecure_channel|ManagedChannelBuilder|stub\\.SayHello|Channel\\.connect|zeep\\.Client)\\b"
        weight: 2.0

    e2e:
      - name: "browser navigation"
        pattern: "\\b(driver\\.get|browser\\.navigate|page\\.goto|page\\.navigate|visit\\s*\\(|openBrowser|start_chrome|start_firefox)\\b"
        weight: 3.0

      - name: "element interaction"
        pattern: "\\b(driver\\.findElement|driver\\.find_element|page\\.click|page\\.fill|page\\.type|page\\.screenshot|page\\.waitFor|fill_in|click_button|click_link)\\b"
        weight: 2.5

      - name: "Cypress commands"
        pattern: "\\bcy\\.(visit|get|contains|click|type|intercept|wait|fixture|request|url)\\s*\\("
        weight: 3.5

      - name: "Playwright actions"
        pattern: "\\b(page|browser|context)\\.(goto|click|fill|screenshot|waitFor|locator|evaluate|route)\\s*\\("
        weight: 3.5

      - name: "Geb / Capybara DSL"
        pattern: "\\b(page\\.visit|have_selector|have_content|within\\s*\\(|fill_in|click_button|go\\s+to\\s+Page)\\b"
        weight: 3.0

      - name: "Mobile automation (Detox/Appium)"
        pattern: "\\b(device\\.launchApp|element\\s*\\(by\\.|driver\\.startActivity|MobileBy\\.|TouchAction)\\b"
        weight: 3.5

      - name: "URL / full-stack hint"
        pattern: "\\b(http://localhost|https://localhost|base_url|BASE_URL|APP_URL|baseURL|root_url)\\b"
        weight: 1.5

# ────────────────────────────────────────────────────────────
# 3. Scoring configuration
# ────────────────────────────────────────────────────────────
scoring:
  ambiguity_threshold: 0.15
  min_confidence: 0.30
