name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Unit & integration tests for the Python package
  # ─────────────────────────────────────────────────────────────
  test:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package and test dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --tb=short -q

  # ─────────────────────────────────────────────────────────────
  # 2. Lint / format check
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dev tools
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

  # ─────────────────────────────────────────────────────────────
  # 3. Dogfood — run the action on this repo itself
  # ─────────────────────────────────────────────────────────────
  analyze-self:
    name: Analyze this repo
    runs-on: ubuntu-latest
    # Only run on the main branch so forks don't fail on thresholds
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Run Test Pyramid Analyzer
        id: tpa
        uses: ./          # use the action from the current checkout
        with:
          repo-path: '.'
          output-format: 'json'
          output-file: 'test-pyramid-report.json'
          debug: 'false'

      - name: Print action outputs
        run: |
          echo "Unit:         ${{ steps.tpa.outputs.unit-percentage }}"
          echo "Integration:  ${{ steps.tpa.outputs.integration-percentage }}"
          echo "E2E:          ${{ steps.tpa.outputs.e2e-percentage }}"
          echo "Total files:  ${{ steps.tpa.outputs.total-test-files }}"
          echo "Anti-patterns: ${{ steps.tpa.outputs.anti-patterns-detected }}"
          echo "Passed:       ${{ steps.tpa.outputs.passed }}"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-pyramid-report
          path: test-pyramid-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # 4. Build Docker image (validate Dockerfile)
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t test-pyramid-analyzer:ci .
